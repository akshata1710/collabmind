services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collabmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/collabmind
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  notification:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/collabmind
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.services.notification_worker

volumes:
  pgdata: